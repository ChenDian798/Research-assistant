<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Medical Decorative Icon Pack Preview</title>
<style>
  body{font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;margin:32px;background:#fff;color:#17233d;}
  h1{font-size:24px;margin:0 0 8px;}
  p{margin:0 0 24px;color:#5e6a82;}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:22px;max-width:1000px;}
  .card{border:1px solid #edf0f5;border-radius:18px;padding:18px;box-shadow:0 8px 28px rgba(11,42,120,.05);}
  .card img{width:100%;height:120px;object-fit:contain;display:block;}
  .card div{font-size:13px;margin-top:12px;text-align:center;color:#44506a;word-break:break-word;}
</style>
</head>
<body>
<h1>Medical Decorative Icon Pack</h1>
<p>10 个透明背景、独立可编辑 SVG。</p>
<div class="grid">
  <div class="card"><img src="firework-burst.svg" alt="firework-burst.svg"><div>firework-burst.svg</div></div>
  <div class="card"><img src="sparkle-cluster.svg" alt="sparkle-cluster.svg"><div>sparkle-cluster.svg</div></div>
  <div class="card"><img src="confetti-burst.svg" alt="confetti-burst.svg"><div>confetti-burst.svg</div></div>
  <div class="card"><img src="airflow-swirl.svg" alt="airflow-swirl.svg"><div>airflow-swirl.svg</div></div>
  <div class="card"><img src="breeze-leaves.svg" alt="breeze-leaves.svg"><div>breeze-leaves.svg</div></div>
  <div class="card"><img src="ribbon-swirl.svg" alt="ribbon-swirl.svg"><div>ribbon-swirl.svg</div></div>
  <div class="card"><img src="shooting-star.svg" alt="shooting-star.svg"><div>shooting-star.svg</div></div>
  <div class="card"><img src="comet.svg" alt="comet.svg"><div>comet.svg</div></div>
  <div class="card"><img src="cloud-puff.svg" alt="cloud-puff.svg"><div>cloud-puff.svg</div></div>
  <div class="card"><img src="radiant-sparkle.svg" alt="radiant-sparkle.svg"><div>radiant-sparkle.svg</div></div>
</div>
</body>
</html>
